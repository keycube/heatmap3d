<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{ page.title | default: "Keycube Heatmap 3D" }}</title>
  <link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/landing.css">
</head>
<body>
  <!-- Keycube-style header -->
  <header class="site-header">
    <div class="header-wrapper">
      <a class="site-title" href="https://keycube.io" target="_blank" rel="noopener">
        <img class="site-logo" src="{{ site.baseurl }}/assets/img/k3logo.png" alt="Keycube"/>
      </a>
      <nav class="site-nav">
        <a class="nav-link" href="https://keycube.io" target="_blank">About</a>
        <a class="nav-link" href="https://keycube.io/research/" target="_blank">Research</a>
        <a class="nav-link active">Heatmap 3D</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <!-- Keycube-style footer -->
  <footer class="site-footer">
    <div class="footer-wrapper">
      <p class="footer-text">Keycube — The keycube is a kind of keyboard. A cubic device dedicated to text entry.</p>
      <div class="footer-links">
        <a href="https://keycube.io" target="_blank" rel="noopener">keycube.io</a>
        <span class="separator">·</span>
        <a href="https://github.com/keycube" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <!-- Three.js import map
       Source: https://threejs.org/docs/#manual/en/introduction/Installation
       Using unpkg CDN as recommended in official Three.js documentation -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  {% include model-viewer-static.html %}
</body>
</html>
