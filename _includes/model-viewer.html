<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// Scene Setup
const scene = new THREE.Scene();
scene.background = new THREE.Color('#ffffff');

// Camera — slightly above center, looking at the cube from behind.
// User stands BEHIND the cube, sees Yellow (right hand) on left, Blue (left hand) on right.
const camera = new THREE.PerspectiveCamera(25, 1, 0.1, 1000);
camera.position.set(0, 2, -5);
const initialCameraPosition = camera.position.clone();

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
const container = document.getElementById('model-container');
if (container) {
  renderer.setSize(container.offsetWidth, container.offsetHeight);
  container.appendChild(renderer.domElement);
  camera.aspect = container.offsetWidth / container.offsetHeight;
} else {
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  camera.aspect = window.innerWidth / window.innerHeight;
}
camera.updateProjectionMatrix();

// Controls — smooth rotation like Playdate
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;  // Smooth inertia effect
controls.rotateSpeed = 0.5;     // Slower, more controlled rotation

// Zoom limits
controls.minDistance = 3;   // Prevent zooming too close
controls.maxDistance = 12;  // Prevent zooming too far

// Auto-rotation settings (integrated with OrbitControls)
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;  // Slow rotation (degrees per second)

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 5, 5);
scene.add(ambientLight, directionalLight);

// Main cube
const cubeGeometry = new RoundedBoxGeometry(1, 1, 1, 4, 0.1);
const cubeMaterial = new THREE.MeshStandardMaterial({ color: 0xD2B48C });
const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);

// Keycube group
const keycubeGroup = new THREE.Group();
keycubeGroup.add(cube);

// Key configuration
const keySize = 0.15;
const keyGeometry = new THREE.BoxGeometry(keySize, keySize, keySize);
const spacing = 0.20;
const offset = 0.5;

// Face layout — matches the diagonal holding position (Figure 4 of the paper).
// The cube is rotated 45° around Y so from the camera (now at Z-5, behind the cube)
// the two visible diagonal faces are: front-left = z-1, front-right = x+1.
// The USER stands BEHIND the cube (same as camera), so their perspective matches.
// The 6th face (y-1, bottom) has no keys.
//
//   R (Red)    → y+1 (top)         — shared by both thumbs
//   B (Blue)   → z-1 (front-left from camera)  — user's LEFT hand external face
//   Y (Yellow) → x+1 (front-right from camera) — user's RIGHT hand external face
//   W (White)  → x-1 (back-left)   — next to Blue, internal
//   G (Green)  → z+1 (back-right)  — next to Yellow, internal
const faces = [
  { axis: 'y', sign: 1,  prefix: 'R', color: 'red' },
  { axis: 'z', sign: -1, prefix: 'B', color: 'blue' },
  { axis: 'x', sign: 1,  prefix: 'Y', color: 'yellow' },
  { axis: 'x', sign: -1, prefix: 'W', color: 'white' },
  { axis: 'z', sign: 1,  prefix: 'G', color: 'green' }
];

// Create text label as a small plane decal stuck on the key surface
function createTextLabel(text, axis, sign) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 4;
  ctx.strokeText(text, 64, 64);
  ctx.fillStyle = 'white';
  ctx.fillText(text, 64, 64);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const material = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    depthTest: true,
    depthWrite: false,
    side: THREE.FrontSide
  });

  const planeSize = 0.13;
  const geometry = new THREE.PlaneGeometry(planeSize, planeSize);
  const mesh = new THREE.Mesh(geometry, material);

  // Orient the plane to face outward from the key surface
  if (axis === 'y') {
    mesh.rotation.x = sign > 0 ? -Math.PI / 2 : Math.PI / 2;
  } else if (axis === 'x') {
    mesh.rotation.y = sign > 0 ? Math.PI / 2 : -Math.PI / 2;
  } else {
    // z axis: sign > 0 faces toward camera (no rotation needed), sign < 0 faces away
    if (sign < 0) mesh.rotation.y = Math.PI;
  }

  mesh.userData = { isLabel: true };
  return mesh;
}

// Create dynamic score label (initially hidden)
function createScoreLabel(axis, sign) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const material = new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    depthTest: true,
    depthWrite: false,
    side: THREE.FrontSide
  });

  const planeSize = 0.14;  // Slightly larger to fit both texts
  const geometry = new THREE.PlaneGeometry(planeSize, planeSize);
  const mesh = new THREE.Mesh(geometry, material);

  // Orient the plane to face outward from the key surface
  if (axis === 'y') {
    mesh.rotation.x = sign > 0 ? -Math.PI / 2 : Math.PI / 2;
  } else if (axis === 'x') {
    mesh.rotation.y = sign > 0 ? Math.PI / 2 : -Math.PI / 2;
  } else {
    if (sign < 0) mesh.rotation.y = Math.PI;
  }

  mesh.userData = { isScoreLabel: true, canvas: canvas, texture: texture };
  mesh.visible = false; // Hidden by default
  return mesh;
}

// Update score label text - shows both key ID and score
function updateScoreLabelText(mesh, score, keyID) {
  const canvas = mesh.userData.canvas;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 256);
  
  // Format score: display as integer (1-10)
  const scoreText = Math.round(score).toString();
  
  // Draw key ID in smaller text at top (more visible positioning)
  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 6;
  ctx.strokeText(keyID, 128, 75);
  ctx.fillStyle = '#FFFF00';  // Yellow for visibility
  ctx.fillText(keyID, 128, 75);
  
  // Draw score in larger text below
  ctx.font = 'bold 100px Arial';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 8;
  ctx.strokeText(scoreText, 128, 175);
  ctx.fillStyle = 'white';
  ctx.fillText(scoreText, 128, 175);
  
  mesh.userData.texture.needsUpdate = true;
  mesh.visible = true;
}

// Store score labels for each key
const scoreLabels = {};

// Create keys
faces.forEach(({ axis, sign, prefix, color }) => {
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      const key = new THREE.Mesh(keyGeometry, new THREE.MeshStandardMaterial({ color }));
      const keyIndex = i * 4 + j + 1;
      const keyID = `${prefix}${keyIndex}`;
      
      key.userData = { id: keyID, face: prefix, index: keyIndex, originalColor: color, axis: axis, sign: sign, gridI: i, gridJ: j };
      key.name = keyID;

      const u = (i - 1.5) * spacing;
      const v = (j - 1.5) * spacing;

      if (axis === 'y') {
        key.position.set(u, offset * sign, v);
      } else if (axis === 'x') {
        key.position.set(offset * sign, u, v);
      } else {
        key.position.set(u, v, offset * sign);
      }

      // Store original position immediately at creation time
      key.userData.originalPosition = key.position.clone();

      keycubeGroup.add(key);

      // Add text label flush on the key's outer surface
      const label = createTextLabel(keyID, axis, sign);
      label.userData.parentKeyId = keyID; // link label to its parent key
      const labelLift = 0.078; // half key height + tiny gap to avoid z-fighting
      if (axis === 'y') {
        label.position.set(u, (offset + labelLift) * sign, v);
      } else if (axis === 'x') {
        label.position.set((offset + labelLift) * sign, u, v);
      } else {
        label.position.set(u, v, (offset + labelLift) * sign);
      }
      label.userData.originalPosition = label.position.clone();
      keycubeGroup.add(label);

      // Add score label (hidden by default, shown when participant selected)
      const scoreLabel = createScoreLabel(axis, sign);
      scoreLabel.userData.parentKeyId = keyID;
      const scoreLabelLift = 0.079; // slightly above the key
      if (axis === 'y') {
        scoreLabel.position.set(u, (offset + scoreLabelLift) * sign, v);
      } else if (axis === 'x') {
        scoreLabel.position.set((offset + scoreLabelLift) * sign, u, v);
      } else {
        scoreLabel.position.set(u, v, (offset + scoreLabelLift) * sign);
      }
      scoreLabel.userData.originalPosition = scoreLabel.position.clone();
      keycubeGroup.add(scoreLabel);
      scoreLabels[keyID] = scoreLabel;
    }
  }
});

// ─── Diagonal holding position (Figure 4, left photo) ───
// The cube is held FLAT and horizontal, rotated 45° around the
// vertical axis (Y). Seen from above it forms a diamond/rhombus.
// Red face is on top, 6th face (no keys) is on the bottom.
// Initial view shows G (Green, z+1) and W (White, x-1) faces in foreground.
// With camera at Z-5 (behind), we rotate -135° (or +225°) to show G and W.
keycubeGroup.rotation.y = -Math.PI * 3 / 4;  // -135° to show G and W faces

// ─── Auto-rotation control ───
// OrbitControls.autoRotate handles the smooth rotation.
// Stop auto-rotation on any user interaction.
function stopAutoRotate() {
  controls.autoRotate = false;
}

renderer.domElement.addEventListener('pointerdown', stopAutoRotate);
renderer.domElement.addEventListener('wheel', stopAutoRotate);
renderer.domElement.addEventListener('touchstart', stopAutoRotate);

// ─── Orbit pivot ───
// Target = cube center. The user can spin the cube around itself
// horizontally, but vertical tilt is locked (see polar angle limits).
controls.target.set(0, 0, 0);
const initialControlsTarget = controls.target.clone();
controls.saveState();

scene.add(keycubeGroup);

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// Window resize and orientation change
function handleResize() {
  const container = document.getElementById('model-container');
  if (container) {
    camera.aspect = container.offsetWidth / container.offsetHeight;
    renderer.setSize(container.offsetWidth, container.offsetHeight);
  } else {
    camera.aspect = window.innerWidth / window.innerHeight;
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', () => {
  setTimeout(handleResize, 100);
});

// Update model function
window.updateModel = function(data) {
  console.log('Updating model with data:', data);
  
  if (data.handedness) {
    keycubeGroup.scale.x = data.handedness === 'left' ? -1 : 1;
  }
  
  if (data.reset) {
    // Reset all colors and positions to original
    keycubeGroup.children.forEach(child => {
      if (child.userData?.originalColor) {
        child.material.color.set(child.userData.originalColor);
        child.scale.set(1, 1, 1);
        if (child.userData.originalPosition) {
          child.position.copy(child.userData.originalPosition);
        }
      } else if (child.userData?.isLabel) {
        child.visible = true; // Show text labels on reset
        if (child.userData.originalPosition) {
          child.position.copy(child.userData.originalPosition);
        }
      } else if (child.userData?.isScoreLabel) {
        child.visible = false; // Hide score labels on reset
      }
    });
    // Reset cube scale
    keycubeGroup.scale.setScalar(1);
    keycubeGroup.scale.x = 1;
    // Preserve diagonal holding rotation (never reset it)
    keycubeGroup.rotation.set(0, -Math.PI * 3 / 4, 0);
    return;
  }

  // Show/hide score labels (and hide/show text labels inversely)
  if (data.showScores !== undefined) {
    Object.values(scoreLabels).forEach(label => {
      label.visible = data.showScores;
    });
    // Hide text labels when showing scores
    keycubeGroup.children.forEach(child => {
      if (child.userData?.isLabel) {
        child.visible = !data.showScores;
      }
    });
  }

  // Update score values on labels
  if (data.scores) {
    ['R', 'B', 'G', 'W', 'Y'].forEach(face => {
      if (data.scores[face]) {
        data.scores[face].forEach((score, idx) => {
          const keyID = `${face}${idx + 1}`;
          if (scoreLabels[keyID]) {
            updateScoreLabelText(scoreLabels[keyID], score, keyID);
          }
        });
      }
    });
  }

  // Hide scores (when no participant selected) and restore text labels
  if (data.hideScores) {
    Object.values(scoreLabels).forEach(label => {
      label.visible = false;
    });
    // Show text labels again
    keycubeGroup.children.forEach(child => {
      if (child.userData?.isLabel) {
        child.visible = true;
      }
    });
  }
  
  if (data.wireframe !== undefined) {
    scene.traverse(function (child) {
        if (child.isMesh && !child.userData?.isLabel) {
            child.material.wireframe = data.wireframe;
        }
    });
  }

  if (data.backgroundColor) {
      renderer.setClearColor(data.backgroundColor);
  }

  if (data.resetView) {
    camera.position.copy(initialCameraPosition);
    controls.target.copy(initialControlsTarget);
    camera.zoom = 1;
    camera.updateProjectionMatrix();
    controls.update();
  }

  if (data.lightingIntensity !== undefined) {
    directionalLight.intensity = data.lightingIntensity;
  }

  // ─── Heatmap color helper ───
  // invert=true: low value → green, high value → red (for preference: 1=best → green)
  // invert=false: low value → red, high value → green (for reachability: high=good → green)
  function heatmapColor(normalized, invert) {
    const hue = (invert ? (1 - normalized) : normalized) * 0.33;
    const c = new THREE.Color();
    c.setHSL(hue, 0.9, 0.5);
    return c;
  }

  // Heatmap visualization — all faces
  if (data.heatmap) {
    const heatmapData = data.heatmap;
    const min = data.heatmapMin !== undefined ? data.heatmapMin : 0;
    const max = data.heatmapMax !== undefined ? data.heatmapMax : 1;
    const range = max - min || 1;
    const invert = !!data.heatmapInvert; // true for preference data

    keycubeGroup.children.forEach(child => {
      if (child.userData?.face && child.userData?.index && heatmapData[child.userData.face]) {
        const value = heatmapData[child.userData.face][child.userData.index - 1];
        const normalized = Math.max(0, Math.min(1, (value - min) / range));
        child.material.color.set(heatmapColor(normalized, invert));
        child.scale.set(1, 1, 1);
      } else if (child !== cube && child.userData?.originalColor) {
        child.material.color.set(child.userData.originalColor);
        child.scale.set(1, 1, 1);
      }
    });
  }

  // Heatmap visualization — single face highlighted, others dimmed
  if (data.heatmapSingleFace) {
    const heatmapData = data.heatmapSingleFace;
    const min = data.heatmapMin !== undefined ? data.heatmapMin : 0;
    const max = data.heatmapMax !== undefined ? data.heatmapMax : 1;
    const range = max - min || 1;
    const invert = !!data.heatmapInvert;

    keycubeGroup.children.forEach(child => {
      if (!child.userData?.face || !child.userData?.index) return;

      child.scale.set(1, 1, 1);

      if (heatmapData[child.userData.face]) {
        const value = heatmapData[child.userData.face][child.userData.index - 1];
        const normalized = Math.max(0, Math.min(1, (value - min) / range));
        child.material.color.set(heatmapColor(normalized, invert));
      } else {
        const dimmed = new THREE.Color(child.userData.originalColor);
        dimmed.multiplyScalar(0.3);
        child.material.color.set(dimmed);
      }
    });
  }
};
</script>
